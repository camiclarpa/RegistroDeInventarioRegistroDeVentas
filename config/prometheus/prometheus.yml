global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  - job_name: 'sigc-microservices'
    scrape_interval: 5s
    static_configs:
      - targets:
          - 'sigc_app:3000'
          - 'sigc_inventory_service:3003'
          - 'sigc_notification_service:3004'
          - 'sigc_report_service:3005'
    metrics_path: '/metrics'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'redis'
    static_configs:
      - targets: ['sigc_redis:6379']
