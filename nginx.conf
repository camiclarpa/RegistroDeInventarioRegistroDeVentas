events {
    worker_connections 1024;
}

http {
    # Backend API
    upstream backend {
        server sigc_app:3000;
    }
    
    # Voice Agent
    upstream voice {
        server sigc_voice:8000;
    }
    
    # Servidor HTTP (redirige a HTTPS si hay SSL)
    server {
        listen 80;
        server_name motos.quantacloud.co;
        
        # Frontend estático (si existe)
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
        }
        
        # Proxy a Backend API
        location /api/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # Proxy a Voice Agent
        location /voice/ {
            proxy_pass http://voice;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }
    }
    
    # Servidor HTTPS (si hay certificados)
    # server {
    #     listen 443 ssl http2;
    #     server_name motos.quantacloud.co;
    #     
    #     ssl_certificate /etc/nginx/certs/motos.quantacloud.co/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/certs/motos.quantacloud.co/privkey.pem;
    #     
    #     # ... misma configuración que HTTP ...
    # }
}
