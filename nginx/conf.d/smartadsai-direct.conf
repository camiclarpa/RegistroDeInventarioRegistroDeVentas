# ============================================================
# SMARTADSAI.CO - Landing page + Login + API
# Con resolver para permitir inicio aunque el servicio no esté disponible
# ============================================================

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name smartadsai.co www.smartadsai.co;

    # SSL: Certificados Cloudflare
    ssl_certificate     /etc/ssl/nginx/cloudflare/origin-cert.pem;
    ssl_certificate_key /etc/ssl/nginx/cloudflare/origin-key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # DNS Resolver para resolver nombres dinámicamente
    resolver 127.0.0.11 valid=10s;
    resolver_timeout 5s;

    # Root para archivos estáticos
    root /var/www/smartadsai;
    index index.html login.html;

    # API de Synapse Chat (con variable para resolución dinámica)
    location /api/v1/synapse/ {
        set $upstream_synapse http://quanta-synapse-chat:80;
        
        proxy_pass $upstream_synapse;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;

        # Manejo de errores si el servicio no está disponible
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_intercept_errors on;
        error_page 502 503 504 /503.html;
    }

    # Página de error personalizada
    location = /503.html {
        return 503 '<html><body><h1>Servicio no disponible</h1><p>El servicio de Synapse Chat no está disponible en este momento.</p></body></html>';
        add_header Content-Type text/html;
    }

    # Login page
    location = /login {
        try_files /login.html /index.html =404;
    }

    # Archivos estáticos
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Denegar acceso a archivos ocultos
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

    # --- NUEVO: Rutas para Orchestrator Core (Auth y Campaigns) ---
    # Puente hacia el contenedor orchestrator-core en puerto 5002
    
    location /api/v1/campaigns/ {
        set $upstream_orchestrator http://orchestrator-core:5002;
        proxy_pass $upstream_orchestrator;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /api/v1/auth/ {
        set $upstream_orchestrator http://orchestrator-core:5002;
        proxy_pass $upstream_orchestrator;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }
    
    location /health {
        set $upstream_orchestrator http://orchestrator-core:5002;
        proxy_pass $upstream_orchestrator/health;
    }
