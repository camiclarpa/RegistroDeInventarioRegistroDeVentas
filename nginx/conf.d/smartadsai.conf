# SmartAds AI - Configuración exclusiva para smartadsai.co
# Ubicada en: /opt/SIGH_MOTOS/nginx/conf.d/smartadsai.conf

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name smartadsai.co www.smartadsai.co;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name smartadsai.co www.smartadsai.co;

    # Certificados SSL (Cloudflare Origin o Let's Encrypt)
    ssl_certificate     /etc/ssl/nginx/cloudflare/origin-cert.pem;
    ssl_certificate_key /etc/ssl/nginx/cloudflare/origin-key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers on;

    # Frontend estático (React build)
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
        
        # Cache para assets estáticos
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # API Orchestrator Core (Auth + Campaigns) - Puerto 5002
    location /api/v1/auth/ {
        proxy_pass http://orchestrator-core:5002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    location /api/v1/campaigns/ {
        proxy_pass http://orchestrator-core:5002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # IA Conversacional (Synapse Chat existente) - Puerto 80
    location /api/v1/synapse/ {
        proxy_pass http://quanta-synapse-chat:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://orchestrator-core:5002/health;
        access_log off;
    }

    # Logging
    access_log /var/log/nginx/smartadsai_access.log;
    error_log /var/log/nginx/smartadsai_error.log warn;
}
